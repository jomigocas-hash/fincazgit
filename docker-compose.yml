version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: inmuebles_db
    environment:
      POSTGRES_DB: inmuebles
      POSTGRES_USER: inmuebles_user
      POSTGRES_PASSWORD: inmuebles_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data-engine/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inmuebles_user -d inmuebles"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    container_name: inmuebles_api
    env_file: ./api/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: inmuebles_frontend
    env_file: ./frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
